<main>
  <section class="hero hero-auth">
    <div class="hero-copy">
      <p class="eyebrow">Welcome back</p>
      <h1>Sign in to Grace Fellowship Church</h1>
      <p class="hero-text">
        Enter your credentials to access events, member resources, and announcements.
      </p>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <form class="auth-form" (submit)="onSubmit($event)">
        <label>
          Email
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
        </label>

        <label>
          Password
          <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
        </label>

        <button type="submit" class="btn auth-submit" [disabled]="loading">
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <div class="auth-message" *ngIf="message">{{ message }}</div>

      <p class="auth-hint">
        Don't have an account?
        <a href="#" class="switch-link" (click)="goToSignup($event)">Create account</a>
      </p>
    </div>
  </section>
</main>
