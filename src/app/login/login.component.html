<main>
  <section class="hero hero-auth">
    <div class="hero-copy">
      <p class="eyebrow">Welcome back</p>
      <h1>Sign in to Grace Fellowship Church</h1>
      <p class="hero-text">
        Enter your credentials to access events, member resources, and announcements.
      </p>
    </div>
  </section>

  <section class="auth-panel">
    <div class="auth-card">
      <form class="auth-form" (submit)="onSubmit($event)">
        <label>
          Email
          <input type="email" placeholder="you@example.com" required />
        </label>

        <label>
          Password
          <input type="password" placeholder="Enter your password" required />
        </label>

        <button type="submit" class="btn auth-submit">Login</button>
      </form>

      <p class="auth-hint">
        New to Grace Fellowship?
        <a routerLink="/signup" class="switch-link">Sign up now</a>
      </p>
    </div>
  </section>
</main>
